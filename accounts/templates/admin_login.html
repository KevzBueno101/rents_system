{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>RENTS - Administration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- No favicon hint to admin page -->
    <style>
        body { background: #111; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { background: #1e1e1e; border: 1px solid #333; border-radius: 12px; padding: 2.5rem; width: 100%; max-width: 380px; }
        .login-card h4 { color: #fff; font-weight: 700; margin-bottom: 0.25rem; }
        .login-card small { color: #666; }
        .form-control { background: #2a2a2a; border: 1px solid #444; color: #fff; }
        .form-control:focus { background: #2a2a2a; border-color: #666; color: #fff; box-shadow: none; }
        .form-control::placeholder { color: #555; }
        .input-group-text { background: #2a2a2a; border: 1px solid #444; color: #888; }
        .btn-admin { background: #fff; color: #111; font-weight: 600; border: none; }
        .btn-admin:hover { background: #e0e0e0; }
        .forgot-link { color: #888; font-size: 13px; text-decoration: none; }
        .forgot-link:hover { color: #aaa; }
        .eye-btn { cursor: pointer; }
    </style>
</head>
<body>

{% if error_modal %}
<div class="modal fade" id="errorModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-sm">
        <div class="modal-content bg-dark border-secondary">
            <div class="modal-header border-secondary">
                <h6 class="modal-title text-danger">Login Failed</h6>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body text-white-50 small">{{ error }}</div>
            <div class="modal-footer border-secondary">
                <button class="btn btn-sm btn-secondary" data-bs-dismiss="modal">OK</button>
            </div>
        </div>
    </div>
</div>
{% endif %}


<div class="login-card">
    <div class="text-center mb-4">
        <i class="bi bi-shield-lock" style="font-size: 2rem; color: #666;"></i>
        <h4 class="mt-2">Administration</h4>
        <small>RENTS | Authorized access only</small>
    </div>

    <form method="POST" action="{% url 'admin_login' %}">
        {% csrf_token %}
        {% if request.GET.next %}
        <input type="hidden" name="next" value="{{ request.GET.next }}">
        {% endif %}

        <div class="input-group mb-3">
            <span class="input-group-text"><i class="bi bi-person"></i></span>
            <input type="text" name="username" class="form-control" placeholder="Username" required autofocus>
        </div>

        <div class="input-group mb-4">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input type="password" id="adminPass" name="password" class="form-control" placeholder="Password" required>
            <span class="input-group-text eye-btn" onclick="togglePass()">
                <i class="bi bi-eye" id="eyeIcon"></i>
            </span>
        </div>

        <button type="submit" class="btn btn-admin w-100 mb-3">Sign In</button>

    </form>

    <p class="text-center mb-0 mt-2">
        <a href="{% url 'login' %}" class="forgot-link">Tenant sign-in</a>
        <span class="text-secondary mx-1">·</span>
        <a href="{% url 'home' %}" class="forgot-link">Website home</a>
    </p>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
function togglePass() {
    const pass = document.getElementById('adminPass');
    const icon = document.getElementById('eyeIcon');
    if (pass.type === 'password') {
        pass.type = 'text';
        icon.classList.replace('bi-eye', 'bi-eye-slash');
    } else {
        pass.type = 'password';
        icon.classList.replace('bi-eye-slash', 'bi-eye');
    }
}

{% if error_modal %}
document.addEventListener('DOMContentLoaded', function() {
    new bootstrap.Modal(document.getElementById('errorModal')).show();
});
{% endif %}
</script>
</body>
</html>
