<section class="section-card">
    <div class="section-header">
        <h2 class="section-title"><i class="bi bi-bell text-warning"></i> Notifications</h2>
        {% if unread_notifications %}
            <span class="t-badge t-badge-warning">{{ unread_notifications }} unread</span>
        {% endif %}
    </div>
    <div class="section-body">
        {% if notifications %}
            <div class="d-flex flex-column gap-2">
                {% for notice in notifications %}
                    <div class="alert alert-{{ notice.level }} mb-0 py-2 px-3 notification-item {% if not notice.is_read %}unread-notification{% endif %}" 
                         style="cursor: pointer; transition: background-color 0.2s;"
                         data-notification-id="{{ notice.id }}"
                         data-link="{{ notice.get_absolute_url }}">
                        <div class="d-flex gap-2 align-items-start">
                            <i class="bi {{ notice.icon }} mt-1 flex-shrink-0"></i>
                            <div class="flex-grow-1 min-w-0">
                                <div class="fw-semibold text-truncate">{{ notice.title }}</div>
                                <div class="small text-muted" style="word-wrap: break-word; white-space: normal; max-height: 40px; overflow: hidden;">{{ notice.message }}</div>
                            </div>
                            {% if not notice.is_read %}
                                <span class="badge bg-danger rounded-pill flex-shrink-0" style="font-size: 0.65rem; min-width: 18px; text-align: center;">New</span>
                            {% endif %}
                        </div>
                    </div>
                {% endfor %}
            </div>
        {% else %}
            <div class="t-empty py-4">
                <i class="bi bi-bell-slash"></i>
                <p>No alerts right now.</p>
            </div>
        {% endif %}
    </div>
</section>

<style>
.notification-item:hover {
    background-color: rgba(0, 123, 255, 0.1);
}
.unread-notification {
    border-left: 4px solid #007bff;
}
</style>

<script>
document.addEventListener('DOMContentLoaded', function() {
    // Add click handlers to notification items
    const notificationItems = document.querySelectorAll('.notification-item');
    
    notificationItems.forEach(function(item) {
        item.addEventListener('click', function() {
            const link = this.dataset.link;
            const notificationId = this.dataset.notificationId;
            
            // Mark as read via AJAX
            if (notificationId) {
                fetch(`/accounts/mark_notification_read/${notificationId}/`, {
                    method: 'POST',
                    headers: {
                        'X-CSRFToken': getCookie('csrftoken'),
                        'Content-Type': 'application/json',
                        'X-Requested-With': 'XMLHttpRequest'
                    }
                }).then(response => response.json())
                .then(data => {
                    if (data.success) {
                        // Remove unread styling
                        this.classList.remove('unread-notification');
                        const newBadge = this.querySelector('.badge.bg-primary');
                        if (newBadge) {
                            newBadge.remove();
                        }
                    }
                }).catch(error => {
                    console.error('Error marking notification as read:', error);
                    // Show non-blocking user feedback
                    console.warn('Failed to mark notification as read. Please try again.');
                });
            }
            
            // Redirect to the link
            if (link && link !== 'None') {
                window.location.href = link;
            }
        });
    });
    
    // Helper function to get CSRF token
    function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            document.cookie.split(';').forEach(cookie => {
                const c = cookie.trim();
                if (c.startsWith(name + '=')) {
                    cookieValue = decodeURIComponent(c.slice(name.length + 1));
                }
            });
        }
        return cookieValue;
    }
});
</script>
