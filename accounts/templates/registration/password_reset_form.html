{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Forgot Password - RENTS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="icon" href="https://img.icons8.com/ios-filled/50/door.png" type="image/png">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        .left-panel { background: linear-gradient(135deg, #111, #333); }
    </style>
</head>
<body>
<div class="container-fluid">
    <div class="row min-vh-100">

        <!-- LEFT PANEL -->
        <div class="col-md-5 d-none d-md-flex left-panel text-white flex-column justify-content-center align-items-center text-center p-3">
            <h1 class="fw-bold display-4">RENTS</h1>
            <p class="mb-2">Residents Entry, Navigation, and Tenant Tracking System</p>
            <p class="px-4">Manage tenants, rooms, and payments efficiently in one system.</p>
        </div>

        <!-- RIGHT PANEL -->
        <div class="col-12 col-md-7 d-flex justify-content-center align-items-center bg-light">
            <div class="card shadow p-4 w-75">

                <div class="text-center mb-3">
                    <i class="bi bi-lock" style="font-size:2.5rem; color:#111;"></i>
                    <h4 class="fw-bold mt-2">Forgot Password</h4>
                    <p class="text-muted" style="font-size:13px;">
                        Enter your email and we'll send you a reset link.
                    </p>
                </div>

                <form method="POST">
                    {% csrf_token %}
                    <div class="input-group mb-3">
                        <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                        <input type="email" name="email" class="form-control" placeholder="Email address" required>
                    </div>
                    <button class="btn btn-dark w-100">
                        <i class="bi bi-send"></i> Send Reset Link
                    </button>
                </form>

                <div class="text-center mt-3">
                    <a href="{% url 'login' %}" class="text-decoration-none text-muted" style="font-size:13px;">
                        <i class="bi bi-arrow-left"></i> Back to Login
                    </a>
                </div>

            </div>
        </div>

    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
