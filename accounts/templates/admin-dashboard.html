{% load static %}

<!DOCTYPE html>
<html>
<head>
    <title>RENTS - Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body class="bg-light">

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark px-4">
    <span class="navbar-brand fw-bold">
        <i class="bi bi-shield-lock"></i> RENTS — Admin
    </span>
    <div class="d-flex align-items-center gap-3">
        <span class="text-white">
            <i class="bi bi-person-circle"></i> {{ request.user.username }}
        </span>
        <a href="{% url 'logout' %}" class="btn btn-outline-light btn-sm">
            <i class="bi bi-box-arrow-right"></i> Logout
        </a>
    </div>
</nav>

<!-- CONTENT -->
<div class="container mt-5">
    <h4 class="mb-4">Welcome back, <strong>{{ request.user.username }}</strong>! 👋</h4>

    <div class="row g-4">
        <div class="col-md-4">
            <div class="card shadow-sm text-center p-4">
                <i class="bi bi-people fs-1 text-dark"></i>
                <h5 class="mt-2">Tenants</h5>
                <p class="text-muted">Manage tenant accounts</p>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card shadow-sm text-center p-4">
                <i class="bi bi-door-open fs-1 text-dark"></i>
                <h5 class="mt-2">Rooms</h5>
                <p class="text-muted">Manage room assignments</p>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card shadow-sm text-center p-4">
                <i class="bi bi-cash-stack fs-1 text-dark"></i>
                <h5 class="mt-2">Payments</h5>
                <p class="text-muted">Track rent payments</p>
            </div>
        </div>
    </div>
</div>

</body>
</html>
